<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Pakistan</title>
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --bg-card: rgba(255, 255, 255, 0.95);
            --text-primary: #1e3c72;
            --text-secondary: #666;
            --text-tertiary: #555;
            --border-color: #eee;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .dark-mode {
            --bg-primary: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --bg-card: rgba(30, 30, 50, 0.95);
            --text-primary: #4fc3f7;
            --text-secondary: #aaa;
            --text-tertiary: #ccc;
            --border-color: #444;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            min-height: 100vh;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .weather-app {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            font-size: 14px;
            background: transparent;
            color: var(--text-primary);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--text-primary);
        }

        .search-box button, .geo-btn {
            padding: 12px 20px;
            background: var(--text-primary);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }

        .geo-btn {
            background: #4caf50;
        }

        .dark-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .city-select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            font-size: 14px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
        }

        .city-name {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .country {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .current-weather {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .weather-icon {
            width: 100px;
            height: 100px;
        }

        .temperature {
            font-size: 56px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .temperature span {
            font-size: 24px;
            vertical-align: top;
        }

        .description {
            font-size: 18px;
            color: var(--text-tertiary);
            text-transform: capitalize;
            text-align: center;
            margin-bottom: 20px;
        }

        .feels-like {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-tertiary);
        }

        .forecast {
            margin-top: 25px;
        }

        .forecast-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .forecast-day {
            background: var(--border-color);
            padding: 10px 5px;
            border-radius: 10px;
            text-align: center;
        }

        .forecast-day-name {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .forecast-icon {
            width: 35px;
            height: 35px;
            margin: 5px 0;
        }

        .forecast-temp {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .error {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .last-updated {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        @media (max-width: 400px) {
            .forecast-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .details {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Landscape mode */
        @media (orientation: landscape) and (max-height: 500px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }
            .weather-app {
                max-width: 700px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                padding: 20px;
            }
            .weather-app .header {
                grid-column: 1 / -1;
            }
            #weatherContent {
                grid-column: 1 / -1;
            }
            .current-weather {
                flex-direction: row;
                justify-content: flex-start;
            }
            .temperature {
                font-size: 40px;
            }
            .weather-icon {
                width: 70px;
                height: 70px;
            }
            .forecast-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* Desktop landscape */
        @media (min-width: 800px) and (orientation: landscape) {
            body {
                padding: 30px;
            }
            .weather-app {
                max-width: 800px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 30px;
                padding: 40px;
            }
            .weather-app .header {
                grid-column: 1 / -1;
            }
            #weatherContent {
                grid-column: 1 / -1;
            }
            .current-weather {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="weather-app">
        <div class="header">
            <h2>Weather App</h2>
            <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
        </div>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." onkeypress="handleKeyPress(event)">
            <button onclick="searchWeather()">Search</button>
            <button class="geo-btn" onclick="getCurrentLocation()" title="Use my location">📍</button>
        </div>

        <select class="city-select" id="citySelect" onchange="selectCity(this.value)">
            <option value="">-- Select City --</option>
            <option value="Rawalpindi,PK">Rawalpindi</option>
            <option value="Islamabad,PK">Islamabad</option>
            <option value="Lahore,PK">Lahore</option>
            <option value="Karachi,PK">Karachi</option>
            <option value="Peshawar,PK">Peshawar</option>
            <option value="Quetta,PK">Quetta</option>
            <option value="Faisalabad,PK">Faisalabad</option>
            <option value="Multan,PK">Multan</option>
            <option value="Sialkot,PK">Sialkot</option>
            <option value="Sukkur,PK">Sukkur</option>
        </select>

        <div id="weatherContent">
            <div class="loading">Loading weather...</div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const contentEl = document.getElementById('weatherContent');
        let isDarkMode = false;

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            document.querySelector('.dark-toggle').textContent = isDarkMode ? '☀️' : '🌙';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchWeather();
            }
        }

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                await getWeather(city);
            }
        }

        function selectCity(city) {
            if (city) {
                getWeather(city);
            }
        }

        function getCurrentLocation() {
            if (navigator.geolocation) {
                contentEl.innerHTML = '<div class="loading">Getting location...</div>';
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const { latitude, longitude } = position.coords;
                        await getWeatherByCoords(latitude, longitude);
                    },
                    (error) => {
                        contentEl.innerHTML = '<div class="error">Location access denied</div>';
                    }
                );
            } else {
                contentEl.innerHTML = '<div class="error">Geolocation not supported</div>';
            }
        }

        async function getWeatherByCoords(lat, lon) {
            if (typeof API_KEY === 'undefined') {
                contentEl.innerHTML = '<div class="error">Add API key in script.js</div>';
                return;
            }

            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`
                );

                if (!response.ok) throw new Error('Weather not found');

                const data = await response.json();
                renderWeather(data);
                getForecast(data.coord.lat, data.coord.lon);
            } catch (error) {
                contentEl.innerHTML = `<div class="error">${error.message}</div>`;
            }
        }

        async function getWeather(city) {
            if (typeof API_KEY === 'undefined') {
                contentEl.innerHTML = '<div class="error">Add API key in script.js</div>';
                return;
            }

            contentEl.innerHTML = '<div class="loading">Loading...</div>';

            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`
                );

                if (!response.ok) throw new Error('City not found');

                const data = await response.json();
                renderWeather(data);
                getForecast(data.coord.lat, data.coord.lon);
            } catch (error) {
                contentEl.innerHTML = `<div class="error">${error.message}</div>`;
            }
        }

        async function getForecast(lat, lon) {
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`
                );

                if (!response.ok) return;

                const data = await response.json();
                renderForecast(data);
            } catch (error) {
                console.log('Forecast not available');
            }
        }

        function renderWeather(data) {
            const iconUrl = `https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png`;
            const now = new Date();
            const updated = now.toLocaleTimeString();

            contentEl.innerHTML = `
                <div class="city-name">${data.name}</div>
                <div class="country">${data.sys.country}</div>
                <div class="current-weather">
                    <img class="weather-icon" src="${iconUrl}" alt="Weather Icon">
                    <div class="temperature">${Math.round(data.main.temp)}<span>°C</span></div>
                </div>
                <div class="description">${data.weather[0].description}</div>
                <div class="feels-like">Feels like ${Math.round(data.main.feels_like)}°C | Min ${Math.round(data.main.temp_min)}°C | Max ${Math.round(data.main.temp_max)}°C</div>
                <div class="details">
                    <div class="detail-item">
                        <span class="detail-value">${data.main.humidity}%</span>
                        <span class="detail-label">Humidity</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-value">${data.wind.speed} m/s</span>
                        <span class="detail-label">Wind</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-value">${data.main.pressure} hPa</span>
                        <span class="detail-label">Pressure</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-value">${data.visibility / 1000} km</span>
                        <span class="detail-label">Visibility</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-value">${data.clouds.all}%</span>
                        <span class="detail-label">Clouds</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-value">${data.main.sea_level || '--'} m</span>
                        <span class="detail-label">Sea Level</span>
                    </div>
                </div>
                <div class="forecast">
                    <div class="forecast-title">5-Day Forecast</div>
                    <div class="forecast-grid" id="forecastGrid"></div>
                </div>
                <div class="last-updated">Updated: ${updated}</div>
            `;
        }

        function renderForecast(data) {
            const forecastGrid = document.getElementById('forecastGrid');
            const dailyData = [];
            const seenDates = new Set();

            for (const item of data.list) {
                const date = new Date(item.dt * 1000).toLocaleDateString();
                if (!seenDates.has(date) && dailyData.length < 5) {
                    seenDates.add(date);
                    dailyData.push(item);
                }
            }

            forecastGrid.innerHTML = dailyData.map(item => {
                const date = new Date(item.dt * 1000);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const iconUrl = `https://openweathermap.org/img/wn/${item.weather[0].icon}.png`;

                return `
                    <div class="forecast-day">
                        <div class="forecast-day-name">${dayName}</div>
                        <img class="forecast-icon" src="${iconUrl}" alt="Icon">
                        <div class="forecast-temp">${Math.round(item.main.temp)}°</div>
                    </div>
                `;
            }).join('');
        }

        // Load default city
        getWeather('Rawalpindi,PK');
    </script>
</body>
</html>
